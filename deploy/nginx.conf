# Install as /etc/nginx/sites-available/thtns-blog and enable it in sites-enabled.
# Certbot can add the HTTPS listener and redirect after DNS points to this server.
server {
    listen 80;
    listen [::]:80;
    server_name thtns.cn www.thtns.cn;

    root /var/www/thtns-blog/current;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ =404;
    }

    location = /404.html {
        internal;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|avif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 404 /404.html;
}
