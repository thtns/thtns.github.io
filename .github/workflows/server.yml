name: Deploy Server

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-server
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production-server
    env:
      DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
      DEPLOY_PORT: ${{ secrets.SERVER_PORT }}
      DEPLOY_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_PATH: ${{ secrets.SERVER_DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with Hexo
        run: npm run build:server

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PATH"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload immutable release
        env:
          RELEASE_NAME: ${{ github.sha }}
        run: |
          RELEASE_PATH="$DEPLOY_PATH/releases/$RELEASE_NAME"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$RELEASE_PATH'"
          rsync -az --delete -e "ssh -p $DEPLOY_PORT" public/ "$DEPLOY_USER@$DEPLOY_HOST:$RELEASE_PATH/"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "ln -sfn '$RELEASE_PATH' '$DEPLOY_PATH/current'"
