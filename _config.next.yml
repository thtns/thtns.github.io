# NexT theme overrides. Keep customizations here so theme upgrades stay painless.
scheme: Gemini
darkmode: true

custom_file_path:
  style: source/_data/styles.styl

creative_commons:
  license: by-nc-sa
  size: small
  sidebar: false
  post: true
  language: deed.zh-hans

open_graph:
  enable: true
  options:
    twitter_card: summary

menu:
  home: / || fa fa-home
  archives: /archives/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags
  about: /about/ || fa fa-user

menu_settings:
  icons: true
  badges: true

sidebar:
  position: left
  display: post
  padding: 20
  offset: 14

avatar:
  url:
  rounded: true
  rotated: false

site_state: true

social:
  GitHub: https://github.com/thtns || fab fa-github
  RSS: /atom.xml || fa fa-rss

social_icons:
  enable: true
  icons_only: false
  transition: true

toc:
  enable: true
  number: true
  wrap: true
  expand_all: false
  max_depth: 4

footer:
  since: 2026
  icon:
    name: fa fa-code
    animated: false
    color: "#0f766e"
  copyright: thtns
  powered: true
  beian:
    # Enable only after replacing the empty values with real registration data.
    enable: true
    icp: 浙ICP备16046325号-1 # 例如：京ICP备12345678号-1
    gongan_id: # 公安备案查询链接中的纯数字 code
    gongan_num: # 例如：京公网安备 11000002000001号
    gongan_icon_url: # 备案图标，例如：/images/beian.png

excerpt_description: true
read_more_btn: true

post_meta:
  item_text: true
  created_at: true
  updated_at:
    enable: true
    another_day: true
  categories: true

symbols_count_time:
  separated_meta: true
  item_text_total: true

reward_settings:
  enable: true
  animation: false

reward:
  wechatpay: /images/wechatpay.jpg
  alipay: /images/alipay.jpg

post_navigation: left

text_align:
  desktop: start
  mobile: start

mobile_layout_economy: true

theme_color:
  light: "#0f766e"
  dark: "#111827"

codeblock:
  theme:
    light: stackoverflow-light
    dark: stackoverflow-dark
  copy_button:
    enable: true
    style: mac
  fold:
    enable: false
    height: 500
  language: true

back2top:
  enable: true
  sidebar: false
  scrollpercent: true

reading_progress:
  enable: true
  start_at: left
  position: top
  reversed: false
  color: "#14b8a6"
  height: 3px

github_banner:
  enable: true
  permalink: https://github.com/thtns

index_with_subtitle: true

mediumzoom: true
lazyload: true
pangu: true

mermaid:
  enable: true
  theme:
    light: neutral
    dark: dark

motion:
  enable: true
  async: true
  duration: 180
  transition:
    menu_item: fadeInDown
    post_block: fadeIn
    post_header: fadeInDown
    post_body: fadeIn
    coll_header: fadeInLeft
    sidebar: fadeInUp

local_search:
  enable: true
  top_n_per_article: 3
  unescape: true
  preload: false

busuanzi_count:
  enable: true
  total_visitors: true
  total_visitors_icon: fa fa-user
  total_views: true
  total_views_icon: fa fa-eye
  post_views: true
  post_views_icon: far fa-eye

vendors:
  internal: local
  plugins: cdnjs
